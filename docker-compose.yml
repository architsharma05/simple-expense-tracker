services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-finance-copilot-postgres
    environment:
      POSTGRES_DB: ai_finance_copilot
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d ai_finance_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

