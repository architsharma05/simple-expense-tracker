services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-finance-copilot-postgres
    environment:
      POSTGRES_DB: ai_finance_copilot
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d ai_finance_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ai-finance-copilot-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/ai_finance_copilot
      DATABASE_USERNAME: finance
      DATABASE_PASSWORD: finance
      JWT_SECRET: change-me-in-production-change-me-now
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: ai-finance-copilot-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  postgres_data:
